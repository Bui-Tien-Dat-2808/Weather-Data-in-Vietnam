x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.2-python3.11}
  env_file:
    - .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW_CORE_EXECUTOR: LocalExecutor
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./requirements.txt:/requirements.txt
    - ./.env:/opt/airflow/.env
  depends_on:
    - postgres
    - minio
  restart: always

services:
  postgres:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-init:
    <<: *airflow-common
    restart: no
    command: >
      bash -c "pip install -r /requirements.txt &&
               airflow db init &&
               airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com"

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.5.0
    env_file:
      - .env
    volumes:
      - ./dbt:/root/dbt
      - ./dbt/profiles.yml:/root/.dbt/profiles.yml
    working_dir: /root/dbt
    depends_on:
      - postgres
    restart: on-failure
    command: ["dbt", "--version"]

  superset:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    image: weather-pipeline-superset:local
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    command: >
      bash -c "superset db upgrade &&
               (superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true) &&
               superset init &&
               superset run -h 0.0.0.0 -p 8088 --with-threads"

volumes:
  postgres_data:
  minio_data:
