# Name of the dbt project
name: 'weather_analytics'
version: '1.0.0'
config-version: 2

# Profile to use for dbt commands
profile: 'weather_analytics'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  
clean-targets:         
  - "target"
  - "dbt_packages"

# Configuring models
models:
  weather_analytics:
    materialized: table
    staging:
      materialized: view
      schema: staging
    marts:
      materialized: table
      schema: marts

# Snapshots
snapshots:
  weather_analytics:
    schema: snapshots
